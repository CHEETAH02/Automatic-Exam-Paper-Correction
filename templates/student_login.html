        <title>Student Login</title>

    </head>
    <body style = "background-image: url('../static/stud_login.jpg'); background-repeat: no-repeat ;background-size: cover;">
            <center><p style="margin-top: 70px;font-size: 50px;" class="text-slate-50">Student Login</p></center>

                    <input type="submit"  style="cursor: pointer;">

                <button  style="cursor: pointer;"><a href="{{ url_for('student_register') }}">Not Registered Yet?</a></button>
            </div>
        
        
    </body>
