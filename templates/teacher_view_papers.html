<html>
    <head>
        <title>View Papers</title>
        <link rel="stylesheet" href = "../static/css/main.css">
    </head>
    <body style = "background-image: url('../static/tcherlogin.jpeg'); background-repeat: no-repeat ;background-size: cover;">
        <center>
            <div style="font-size: 50px;margin-top: 10px;" class="text-slate-50">View Papers</div>
            <div style="width: 600px;height: 600px; margin-top: 40px; padding-top: 20px; padding-bottom: 20px;" class="italic text-slate-50 bg-green-900 rounded-lg">
                {% if nc_len != 0 %}

        <h3>Not Corrected</h3>
        {% for i in range(nc_len) %}
        <div>
            <a href="{{ url_for('teacher.teacher_view_test', paperID=nc_data[i][0]) }}">{{ nc_data[i][1] }}</a>: {{ nc_data[i][2] }}  <button><a href="{{ url_for('test.evaluate_test', paperID=nc_data[i][0]) }}">Correct Paper</a></button><br>
        </div>
        {% endfor %}

        {% endif %}

        {% if c_len != 0 %}

        <h3>Corrected</h3>
        {% for i in range(c_len) %}
        <div>
            <a href="{{ url_for('teacher.teacher_view_test', paperID=c_data[i][0]) }}">{{ c_data[i][1] }}</a>: {{ c_data[i][2] }}<br>
        </div>
        {% endfor %}

        {% endif %}
            </div>
        </center>

        

    </body>
</html>
